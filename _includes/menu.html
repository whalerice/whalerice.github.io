{% assign pages = site.pages | sort: 'order' %}

<ul class="menu">
	<li>
		<a href="/" class="menu-item{% if menu.url=='/' %} active{% endif %}"
			>Home</a
		>
	</li>
	{% for menu in pages %} {% if menu.order %}
	<li>
		<a
			href="{{ menu.url }}"
			class="menu-item{% if menu.url==page.url %} active{% endif %}"
			>{{ menu.title }}</a
		>
	</li>
	{% endif %} {% endfor %}
</ul>
