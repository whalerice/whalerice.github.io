<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>{{ page.title }}</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Material+Icons+Round&family=IBM+Plex+Mono&family=Roboto:ital,wght@0,400;0,700;1,400;1,700&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" type="text/css"
		href="https://cdn.jsdelivr.net/gh/moonspam/NanumBarunGothic@latest/nanumbarungothicsubset.css" />
	<link rel="stylesheet" href="{{ site.asset_url }}/css/main.css" />
	<link href="{{ site.asset_url }}/favicon.ico" rel="shortcut icon" type="image/vnd.microsoft.icon" />
	<script src="{{ site.asset_url }}/js/common.js"></script>
	{% if site.google_analytics and jekyll.environment == 'production' %}
	{% include analytics.html %}
	{% endif %}
</head>

<body>
	<!-- header -->
	{% include header.html %}

	<!-- contents -->
	<section class="container">
		<section class="contents">{{ content }}</section>
	</section>

	<!-- sidebar -->
	{% include sidebar.html %}
	<!-- footer -->
	{% include footer.html %}
</body>

</html>
